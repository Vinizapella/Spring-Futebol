# Nome da aplicańŃo
spring.application.name=soccer

# 1. Configurań§es de ConexŃo (MySQL)
# Adicionei 'allowPublicKeyRetrieval=true' caso use o MySQL 8+ instalado localmente
spring.datasource.url=jdbc:mysql://localhost:3306/soccer?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysqlPW
# O Spring Boot moderno detecta o driver sozinho, mas mantemos para garantir
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configurań§es do Hibernate / JPA
# 'update' cria ou atualiza as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
# Mostra o SQL no console de forma organizada
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANTE: Dialeto genķrico para evitar erros de versŃo do MySQL no Hibernate 7
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. Logs de DepurańŃo (Opcional)
# Mostra os valores reais que o Hibernate estß inserindo no banco
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Log detalhado do Spring Boot (·til se o projeto nŃo subir)
logging.level.org.springframework.web=INFO
